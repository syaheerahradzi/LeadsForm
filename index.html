<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Semak Pelan Takaful</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f5f7fb;

background-image:
linear-gradient(135deg,#e8f5e9 0%,#f5f7fb 50%,#ffffff 100%);

padding:25px;

}

.container{

max-width:700px;

margin:auto;

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:
0 10px 35px rgba(0,0,0,.08);

}

.header{

padding:40px 30px;

text-align:center;

background:linear-gradient(135deg,#0F9D58,#34A853);

color:white;

}

.logo{

width:90px;

height:90px;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

margin:auto;

font-size:40px;

margin-bottom:18px;

}

.header h1{

font-size:30px;

font-weight:700;

margin-bottom:8px;

}

.header p{

opacity:.95;

font-size:15px;

line-height:1.6;

}

.content{

padding:30px;

}

.section{

margin-bottom:35px;

}

.section-title{

font-size:18px;

font-weight:600;

margin-bottom:18px;

color:#222;

display:flex;

align-items:center;

gap:10px;

}

.card-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}

.plan-card{

border:2px solid #ddd;

border-radius:14px;

padding:18px;

cursor:pointer;

transition:.25s;

}

.plan-card:hover{

border-color:#25D366;

transform:translateY(-3px);

}

.plan-card.selected{

background:#E9F9EF;

border-color:#25D366;

}

.plan-card input{

display:none;

}

.plan-title{

font-size:16px;

font-weight:600;

margin-bottom:5px;

}

.plan-desc{

font-size:13px;

color:#666;

}

label{

display:block;

font-weight:600;

margin-bottom:8px;

margin-top:18px;

}

input,
select,
textarea{

width:100%;

padding:13px;

border-radius:10px;

border:1px solid #d7d7d7;

font-size:15px;

outline:none;

transition:.2s;

}

input:focus,
select:focus,
textarea:focus{

border-color:#25D366;

box-shadow:0 0 0 3px rgba(37,211,102,.12);

}

textarea{

resize:vertical;

min-height:100px;

}

.radio-group{

display:flex;

gap:20px;

margin-top:8px;

flex-wrap:wrap;

}

.radio-item{

display:flex;

align-items:center;

gap:8px;

}

.radio-item input{

width:auto;

}

button{

width:100%;

margin-top:35px;

padding:17px;

border:none;

border-radius:12px;

background:#25D366;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#20b85a;

}

#prebirthSection{

display:none;

margin-top:30px;

padding:20px;

background:#FFF7E8;

border-radius:14px;

border:1px solid #FFD76E;

}

.required{

color:red;

}

.footer{

margin-top:18px;

text-align:center;

font-size:12px;

color:#777;

}

@media(max-width:600px){

.header{

padding:30px 20px;

}

.content{

padding:22px;

}

.card-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
🛡️
</div>

<h1>Semak Pelan Takaful</h1>

<p>

Isi maklumat di bawah untuk mendapatkan cadangan pelan yang sesuai dengan keperluan anda.

</p>

</div>

<div class="content"><div class="section">

<div class="section-title">
📋 Pilih Pelan
</div>

<div class="card-grid">

<label class="plan-card">

<input type="radio" name="plan" value="Medical Card">

<div class="plan-title">💳 Medical Card</div>

<div class="plan-desc">
Perlindungan bil hospital & rawatan.
</div>

</label>

<label class="plan-card">

<input type="radio" name="plan" value="Prebirth Medical Card">

<div class="plan-title">🤰 Prebirth Medical Card</div>

<div class="plan-desc">
Perlindungan untuk ibu mengandung & bayi.
</div>

</label>

<label class="plan-card">

<input type="radio" name="plan" value="Hibah">

<div class="plan-title">🎁 Hibah</div>

<div class="plan-desc">
Lump sum kepada waris tersayang.
</div>

</label>

<label class="plan-card">

<input type="radio" name="plan" value="Critical Illness">

<div class="plan-title">❤️ Critical Illness</div>

<div class="plan-desc">
Perlindungan penyakit kritikal.
</div>

</label>

<label class="plan-card">

<input type="radio" name="plan" value="Accident Protection">

<div class="plan-title">🦺 Accident Protection</div>

<div class="plan-desc">
Perlindungan kemalangan 24 jam.
</div>

</label>

</div>

</div>



<div class="section">

<div class="section-title">
👤 Maklumat Peribadi
</div>

<label>
Nama / Name <span class="required">*</span>
</label>

<input
type="text"
id="nama"
placeholder="Contoh: Syaheerah Radzi">

<label>
Tarikh Lahir / Date of Birth <span class="required">*</span>
</label>

<input
type="date"
id="dob">

<label>
Umur / Age
</label>

<input
type="number"
id="umur"
readonly
placeholder="Auto calculated">

<label>
Jantina / Gender
</label>

<div class="radio-group">

<label class="radio-item">
<input type="radio"
name="gender"
value="Lelaki">
Lelaki
</label>

<label class="radio-item">
<input type="radio"
name="gender"
value="Perempuan">
Perempuan
</label>

</div>

</div>



<div class="section">

<div class="section-title">
🏥 Maklumat Kesihatan
</div>

<label>
Sejarah Kesihatan / Medical History
</label>

<textarea
id="history"
placeholder="Contoh: Tiada, Asthma, Diabetes..."></textarea>

<label>
Merokok atau Vape
</label>

<div class="radio-group">

<label class="radio-item">
<input type="radio"
name="smoking"
value="Yes">
Yes
</label>

<label class="radio-item">
<input type="radio"
name="smoking"
value="No">
No
</label>

</div>

</div>



<div class="section">

<div class="section-title">
💼 Maklumat Pekerjaan
</div>

<label>
Pekerjaan / Occupation
</label>

<input
type="text"
id="occupation"
placeholder="Contoh: Engineer">

<label>
Bajet / Budget
</label>

<select id="budget">

<option value="">
-- Pilih Bajet --
</option>

<option>
&lt; RM200
</option>

<option>
RM200 - RM250
</option>

<option>
RM251 - RM300
</option>

<option>
&gt; RM300
</option>

</select>

</div>



<div
id="prebirthSection">

<div class="section-title">
🤰 Maklumat Kehamilan
</div>

<label>
Minggu Kehamilan
</label>

<input
type="number"
id="pregnancyWeek"
placeholder="Contoh: 24">

<label>
Tarikh Dijangka Bersalin
</label>

<input
type="date"
id="dueDate">

</div>



<button
onclick="submitForm()">

FREE QUOTATION

</button>

<div class="footer">

Terima kasih 🙂

</div><script>

// ========= PLAN CARD =========

const cards = document.querySelectorAll(".plan-card");

cards.forEach(card=>{

card.addEventListener("click",()=>{

cards.forEach(c=>c.classList.remove("selected"));

card.classList.add("selected");

togglePrebirth();

});

});

// ========= SHOW/HIDE PREBIRTH =========

function togglePrebirth(){

const selected =
document.querySelector('input[name="plan"]:checked');

const prebirth =
document.getElementById("prebirthSection");

if(!selected){

prebirth.style.display="none";
return;

}

if(selected.value==="Prebirth Medical Card"){

prebirth.style.display="block";

}else{

prebirth.style.display="none";

}

}

// ========= AUTO CALCULATE AGE =========

document
.getElementById("dob")
.addEventListener("change",function(){

let dob=new Date(this.value);

let today=new Date();

let age=today.getFullYear()-dob.getFullYear();

let month=today.getMonth()-dob.getMonth();

if(
month<0 ||
(month===0 && today.getDate()<dob.getDate())
){

age--;

}

document.getElementById("umur").value=age;

});

// ========= RADIO VALUE =========

function radioValue(name){

let radio=document.querySelector(
'input[name="'+name+'"]:checked'
);

return radio ? radio.value : "";

}

// ========= SUBMIT =========

function submitForm(){

let plan=document.querySelector(
'input[name="plan"]:checked'
);

if(!plan){

alert("Sila pilih pelan.");

return;

}

let nama=document.getElementById("nama").value.trim();

if(nama==""){

alert("Sila masukkan nama.");

return;

}

let dob=document.getElementById("dob").value;

if(dob==""){

alert("Sila pilih tarikh lahir.");

return;

}

let umur=document.getElementById("umur").value;

let gender=radioValue("gender");

let history=document.getElementById("history").value;

let smoking=radioValue("smoking");

let occupation=document.getElementById("occupation").value;

let budget=document.getElementById("budget").value;

let pregnancyWeek="";

let dueDate="";

if(plan.value==="Prebirth Medical Card"){

pregnancyWeek=
document.getElementById("pregnancyWeek").value;

dueDate=
document.getElementById("dueDate").value;

}

let message=
`

${plan.value}

Nama: ${nama}
Umur: ${umur}
Tarikh Lahir:${dob}
Jantina:${gender}
Sejarah Kesihatan:${history}
Merokok/Vape:${smoking}
Pekerjaan:${occupation}
Budget:${budget}`;

if(plan.value==="Prebirth Medical Card"){

message+=`
Minggu Kehamilan:${pregnancyWeek}
Expected Due Date:${dueDate}`;

}

// =====================

// CHANGE TO YOUR NUMBER

let phone="601143952210";

// =====================

let url=

"https://wa.me/"+

phone+

"?text="+

encodeURIComponent(message);

window.location.href=url;

}

</script>

</div>

</div>

</body>

</html>
